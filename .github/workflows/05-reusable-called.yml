name: "05 - Reusable Workflow (definition)"

# workflow_call makes this workflow reusable.
# Other workflows invoke it with 'uses: ./.github/workflows/05-reusable-called.yml'
# Inputs and secrets declared here become the public contract for callers.
on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging | production)"
        required: true
        type: string
      version:
        description: "App version to deploy"
        required: true
        type: string
      dry_run:
        description: "Perform a dry-run only"
        required: false
        type: boolean
        default: false

    secrets:
      DEPLOY_TOKEN:
        description: "Deployment API token"
        required: true

    # Callers can read these outputs after the reusable workflow completes
    outputs:
      deploy_url:
        description: "URL of the deployed application"
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      url: ${{ steps.deploy-step.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Version:     ${{ inputs.version }}"
          echo "Dry run:     ${{ inputs.dry_run }}"

      - name: Deploy
        id: deploy-step
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: would deploy ${{ inputs.version }} to ${{ inputs.environment }}"
          else
            echo "Deploying ${{ inputs.version }} to ${{ inputs.environment }}..."
          fi
          # Emit the deploy URL as an output
          echo "url=https://${{ inputs.environment }}.example.com" >> $GITHUB_OUTPUT

      - name: Post-deploy smoke test
        run: |
          echo "Smoke testing https://${{ inputs.environment }}.example.com ..."
          echo "All checks passed"
