name: "02 - Jobs"

# Shows four major job patterns in one workflow:
#   matrix    — run the same job across multiple parameter combinations
#   conditions — if: on jobs and steps
#   dependencies — needs:, job outputs, fan-out / fan-in
# Concurrency is set at the workflow level (see 'concurrency:' below).
on:
  workflow_dispatch:
  push:
    paths: ["src/**", "tests/**"]

# One run per branch. A new push cancels the in-flight run for the same branch.
# Use cancel-in-progress: false on deployment jobs so they aren't cut mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Matrix ────────────────────────────────────────────────────────────
  # Runs the same job across every OS × Python version combination.
  # timeout-minutes caps each matrix leg so a hung run can't burn budget.
  matrix-test:
    name: "Test / ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false     # keep running other legs even if one fails
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-test.txt
      - run: pytest tests/ -v
      - name: Report matrix context
        run: |
          echo "OS:     ${{ matrix.os }}"
          echo "Python: ${{ matrix.python-version }}"

  # ── 1b. Matrix include / exclude ─────────────────────────────────────────
  # Starts with a 2×3 grid (6 legs), then:
  #   exclude: drops the (ubuntu-22.04, 3.10) combination → 5 legs
  #   include: adds one extra leg (ubuntu-latest, 3.13) with a custom
  #            'experimental' parameter that doesn't exist in the base grid.
  # Use this pattern when you want most combinations plus a few one-offs
  # (e.g. only test the latest Python on a bleeding-edge OS).
  matrix-include-exclude:
    name: "Advanced / ${{ matrix.os }} / py${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Skip py3.10 on the older runner — not worth maintaining
          - os: ubuntu-22.04
            python-version: "3.10"
        include:
          # Extra one-off leg not derivable from the base grid
          - os: ubuntu-latest
            python-version: "3.13"
            experimental: true
    # continue-on-error lets the experimental leg fail without failing the workflow.
    # Evaluated per-leg via the matrix value.
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-test.txt
      - run: pytest tests/ -v
      - name: Report leg type
        run: |
          if [ "${{ matrix.experimental }}" = "true" ]; then
            echo "This is an experimental leg — failures are tolerated"
          else
            echo "Standard leg — must pass"
          fi

  # ── 2. Conditions ────────────────────────────────────────────────────────
  # Demonstrates if: on both jobs and steps.
  conditions-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Always runs
        run: echo "This step always runs"

      - name: Only on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Pushed directly to main"

      - name: Only on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manually triggered"

      - name: Produce an output for the next step
        id: check
        run: echo "status=ok" >> $GITHUB_OUTPUT

      - name: Runs only if previous step output == 'ok'
        if: steps.check.outputs.status == 'ok'
        run: echo "Check passed"

      - name: Step with timeout-minutes
        timeout-minutes: 1
        run: echo "This step is capped at 1 minute"

      - name: Non-blocking step (continue-on-error)
        continue-on-error: true
        run: |
          echo "This step exits non-zero but the job keeps going"
          exit 1

      - name: Runs after the failing step thanks to continue-on-error
        run: echo "Still running — previous failure was tolerated"

      - name: always() — runs even on failure
        if: always()
        run: echo "Cleanup or reporting step"

  # ── 3. Fan-out (parallel jobs) → Fan-in ──────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-test.txt
      - id: run
        run: |
          pytest tests/ -v -k "not test_divide_by_zero"
          echo "result=passed" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: run
        run: |
          pip install pyflakes
          python -m pyflakes src/ tests/ && echo "result=passed" >> $GITHUB_OUTPUT || echo "result=failed" >> $GITHUB_OUTPUT

  # Fan-in: waits for both parallel jobs, then aggregates
  report:
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]
    if: always()   # run even if upstream jobs failed, so we always get a report
    steps:
      - name: Aggregate results
        run: |
          echo "=== CI Report ==="
          echo "Unit tests: ${{ needs.unit-tests.outputs.result }}  (job: ${{ needs.unit-tests.result }})"
          echo "Lint:       ${{ needs.lint.outputs.result }}  (job: ${{ needs.lint.result }})"
          if [[ "${{ needs.unit-tests.result }}" != "success" || "${{ needs.lint.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
