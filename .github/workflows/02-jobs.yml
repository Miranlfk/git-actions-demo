name: "02 - Jobs"

# Shows four major job patterns in one workflow:
#   matrix    — run the same job across multiple parameter combinations
#   conditions — if: on jobs and steps
#   dependencies — needs:, job outputs, fan-out / fan-in
# Concurrency is set at the workflow level (see 'concurrency:' below).
on:
  workflow_dispatch:
  push:
    paths: ["src/**", "tests/**"]

# One run per branch. A new push cancels the in-flight run for the same branch.
# Use cancel-in-progress: false on deployment jobs so they aren't cut mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Matrix ────────────────────────────────────────────────────────────
  # Runs the same job across every OS × Python version combination.
  matrix-test:
    name: "Test / ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false     # keep running other legs even if one fails
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-test.txt
      - run: pytest tests/ -v
      - name: Report matrix context
        run: |
          echo "OS:     ${{ matrix.os }}"
          echo "Python: ${{ matrix.python-version }}"

  # ── 2. Conditions ────────────────────────────────────────────────────────
  # Demonstrates if: on both jobs and steps.
  conditions-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Always runs
        run: echo "This step always runs"

      - name: Only on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Pushed directly to main"

      - name: Only on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manually triggered"

      - name: Produce an output for the next step
        id: check
        run: echo "status=ok" >> $GITHUB_OUTPUT

      - name: Runs only if previous step output == 'ok'
        if: steps.check.outputs.status == 'ok'
        run: echo "Check passed"

      - name: always() — runs even on failure
        if: always()
        run: echo "Cleanup or reporting step"

  # ── 3. Fan-out (parallel jobs) → Fan-in ──────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-test.txt
      - id: run
        run: |
          pytest tests/ -v -k "not test_divide_by_zero"
          echo "result=passed" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: run
        run: |
          pip install pyflakes
          python -m pyflakes src/ tests/ && echo "result=passed" >> $GITHUB_OUTPUT || echo "result=failed" >> $GITHUB_OUTPUT

  # Fan-in: waits for both parallel jobs, then aggregates
  report:
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]
    if: always()   # run even if upstream jobs failed, so we always get a report
    steps:
      - name: Aggregate results
        run: |
          echo "=== CI Report ==="
          echo "Unit tests: ${{ needs.unit-tests.outputs.result }}  (job: ${{ needs.unit-tests.result }})"
          echo "Lint:       ${{ needs.lint.outputs.result }}  (job: ${{ needs.lint.result }})"
          if [[ "${{ needs.unit-tests.result }}" != "success" || "${{ needs.lint.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
