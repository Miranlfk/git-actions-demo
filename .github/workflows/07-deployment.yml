name: "07 - Deployment with Environments"

# Environments add protection rules to deployments:
#   - Required reviewers (manual approval gate)
#   - Wait timer (delay before deploy starts)
#   - Branch restrictions (only deploy from main/master)
#   - Environment secrets (credentials scoped to that environment)
#
# Create environments in: Settings > Environments
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-name.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - id: set-name
        run: echo "name=app-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          mkdir -p dist
          echo "version=${{ github.sha }}" > dist/version.txt

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.run_number }}
          path: dist/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    # Referencing the 'staging' environment activates its protection rules
    # and makes its secrets available in this job.
    environment:
      name: staging
      url: https://staging.example.com    # Shown in the GitHub UI deployment panel

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Using secret: ${{ secrets.STAGING_API_KEY != '' && '***' || '(not set)' }}"
          cat dist/version.txt

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Production environment should have required reviewers configured
    # to create a manual approval gate before this job starts.
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Using secret: ${{ secrets.PROD_API_KEY != '' && '***' || '(not set)' }}"
          cat dist/version.txt

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              environment_url: 'https://example.com',
              description: 'Deployed successfully'
            });
            console.log('Deployment status recorded');
