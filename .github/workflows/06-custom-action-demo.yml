name: "06 - Custom Actions Demo"

# Demonstrates using the three custom actions defined in advanced/06-custom-actions/:
#   - composite-action:  runs multiple steps as a single reusable unit
#   - javascript-action: runs a Node.js script as an action
#   - docker-action:     runs inside a container built from a local Dockerfile
# Also shows referencing a public Marketplace action by tag.
on:
  workflow_dispatch:
  push:
    paths:
      - "advanced/06-custom-actions/**"

jobs:
  use-composite-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run our composite action
        id: greet
        uses: ./advanced/06-custom-actions/composite-action
        with:
          name: "GitHub Actions learner"
          language: "en"

      - name: Use the composite action output
        run: |
          echo "Composite action said: ${{ steps.greet.outputs.greeting }}"

  use-javascript-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run our JavaScript action
        id: js-action
        uses: ./advanced/06-custom-actions/javascript-action
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          message: "Hello from a JS action!"

      - name: Use JS action output
        run: |
          echo "JS action result: ${{ steps.js-action.outputs.result }}"

  use-docker-action:
    runs-on: ubuntu-latest   # Docker actions only work on Linux runners
    steps:
      - uses: actions/checkout@v4

      - name: Run our Docker action
        id: docker-action
        uses: ./advanced/06-custom-actions/docker-action
        with:
          name: "GitHub Actions learner"
          language: "es"

      - name: Use Docker action output
        run: |
          echo "Docker action said ${{ steps.docker-action.outputs.greeting }}"
