name: "Beginner CD - Deploy from GHCR"

# CD pipeline for the beginner-demo:
#   - Triggered automatically when the CI workflow finishes (workflow_run)
#   - Pulls the freshly-published image from GHCR
#   - Runs it as a container — that's our "deploy"
#
# workflow_run gotchas to be aware of:
#   * Only fires from the workflow file on the default branch.
#   * Always uses the workflow definition from the default branch, not the
#     commit that triggered CI.
#   * github.event.workflow_run.conclusion tells us whether CI passed.
on:
  workflow_run:
    workflows: ["Beginner CI - Build and Publish"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Skip if CI failed. Manual dispatches always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      packages: read

    steps:
      - name: Compute lowercase image name
        id: img
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${repo_lc}/calculator:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: |
          docker pull ${{ steps.img.outputs.name }}

      - name: Deploy (run the container)
        run: |
          echo "=== Running container ${{ steps.img.outputs.name }} ==="
          docker run --rm ${{ steps.img.outputs.name }}

      - name: Deployment summary
        run: |
          echo "Deployed ${{ steps.img.outputs.name }} successfully"
