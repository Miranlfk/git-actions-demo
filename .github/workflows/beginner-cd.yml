name: "Beginner CD - Deploy from GHCR"

# CD pipeline for the beginner-demo:
#   - Triggered automatically when the CI workflow finishes (workflow_run)
#   - Reads the latest GitHub Release tag so it deploys the exact version CI published
#   - Pulls that versioned image from GHCR and runs it
#
# workflow_run gotchas to be aware of:
#   * Only fires from the workflow file on the default branch.
#   * Always uses the workflow definition from the default branch, not the
#     commit that triggered CI.
#   * github.event.workflow_run.conclusion tells us whether CI passed.
on:
  workflow_run:
    workflows: ["Beginner CI - Build and Publish"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Skip if CI failed. Manual dispatches always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      packages: read
      contents: read    # required to read the latest release tag via GitHub API

    steps:
      # Resolve the exact release version CI just published so the deploy
      # is tied to a specific tag, not a floating :latest.
      - name: Resolve image reference
        id: img
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          tag=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName')
          echo "name=ghcr.io/${repo_lc}/calculator" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Deploying ghcr.io/${repo_lc}/calculator:${tag}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: |
          docker pull ${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }}

      - name: Deploy (run the container)
        run: |
          echo "=== Deploying ${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }} ==="
          docker run --rm ${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }}

      - name: Deployment summary
        run: |
          echo "Deployed ${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }} successfully"
