name: "Beginner CI - Build and Publish"

# CI pipeline for the beginner-demo:
#   1. Run tests — gate everything behind a green build
#   2. Create a GitHub Release with an auto-incremented semver tag
#   3. Build a Docker image and publish it to GHCR using that release tag
#
# The CD pipeline (beginner-cd.yml) listens for this workflow to finish
# and deploys the image it just published.
on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "tests/**"
      - "beginner-demo/**"
      - ".github/workflows/beginner-ci.yml"
  workflow_dispatch:
    inputs:
      demo_mode:
        description: 'Build mode — "vulnerable" swaps in python:3.8 to produce Trivy HIGH/CRITICAL findings'
        required: false
        default: clean
        type: choice
        options:
          - clean
          - vulnerable

# Prevent two releases being created at the same time on master.
# cancel-in-progress: false queues new runs rather than cancelling a
# half-finished release, which could leave an orphaned tag.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Run the existing pytest suite ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v

  # ── 2. Create a GitHub Release with an auto-incremented patch version ─────
  release:
    runs-on: ubuntu-latest
    needs: test

    # contents: write is required to create tags and releases.
    permissions:
      contents: write

    outputs:
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # fetch all history so git tag --sort can find the latest

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest vX.Y.Z tag; start at v0.1.0 if the repo has none yet.
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor + 1}.0"
          fi
          echo "Creating release ${next}..."
          gh release create "${next}" \
            --title "Release ${next}" \
            --generate-notes
          echo "tag=${next}" >> "$GITHUB_OUTPUT"

  # ── 3. Build the Docker image and publish it to GHCR ─────────────────────
  build-and-publish:
    runs-on: ubuntu-latest
    needs: release

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR image paths must be lowercase. github.repository keeps the
      # original casing, so we normalise it here once and reuse the value.
      - name: Compute lowercase image name
        id: img
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${repo_lc}/calculator" >> "$GITHUB_OUTPUT"

      # demo_mode=vulnerable uses python:3.8 (many known CVEs) so Trivy fails.
      # Push-triggered runs always default to clean (inputs is empty on push).
      - name: Select base image
        id: base
        run: |
          if [ "${{ inputs.demo_mode }}" = "vulnerable" ]; then
            echo "python_version=3.8" >> "$GITHUB_OUTPUT"
            echo "Demo mode: using python:3.8 (vulnerable)"
          else
            echo "python_version=3.12-slim" >> "$GITHUB_OUTPUT"
            echo "Clean mode: using python:3.12-slim"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f beginner-demo/Dockerfile \
            --build-arg PYTHON_VERSION=${{ steps.base.outputs.python_version }} \
            -t ${{ steps.img.outputs.name }}:${{ needs.release.outputs.tag }} \
            -t ${{ steps.img.outputs.name }}:latest \
            .

      # Scan the locally-built image before pushing. exit-code: 1 fails the step
      # (and blocks the push) when HIGH or CRITICAL vulnerabilities are found.
      # To see this gate in action, re-run manually with demo_mode=vulnerable.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.name }}:${{ needs.release.outputs.tag }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ steps.img.outputs.name }}:${{ needs.release.outputs.tag }}
          docker push ${{ steps.img.outputs.name }}:latest

      - name: Summary
        run: |
          echo "Image: ${{ steps.img.outputs.name }}"
          echo "Tags pushed: ${{ needs.release.outputs.tag }}, latest"
